<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Celeste Extension</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 480px; height: 640px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #1e293b;
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ── Tab bar ─────────────────────────────────────────────────────────── */
    .popup-tabs {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid #e2e8f0;
      background: linear-gradient(135deg, #1e293b, #334155);
    }
    .popup-tab {
      flex: 1; padding: 11px 0;
      font-size: 12px; font-weight: 600; font-family: inherit;
      border: none; background: none; cursor: pointer;
      color: rgba(255,255,255,0.55); transition: all 0.15s;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.2px;
    }
    .popup-tab:hover  { color: rgba(255,255,255,0.85); }
    .popup-tab.active { color: #fff; border-bottom-color: #818cf8; }

    /* ── Panels ──────────────────────────────────────────────────────────── */
    .popup-panel { display: none; flex: 1; min-height: 0; flex-direction: column; overflow: hidden; }
    .popup-panel.active { display: flex; }

    /* ── Component panel ─────────────────────────────────────────────────── */
    .popup-party-bar {
      display: flex; gap: 7px; flex-shrink: 0;
      padding: 8px 10px; border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .popup-party-input {
      flex: 1; padding: 6px 10px;
      border: 1.5px solid #e2e8f0; border-radius: 6px;
      font-size: 12px; font-family: inherit; color: #1e293b;
      background: #fff; outline: none; transition: all 0.15s;
    }
    .popup-party-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .popup-party-input::placeholder { color: #cbd5e1; }
    .popup-load-btn {
      padding: 6px 14px; border-radius: 6px; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.15s;
      white-space: nowrap;
    }
    .popup-load-btn:hover    { opacity: 0.88; }
    .popup-load-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Tree root must be a flex container so ct-root {height:100%} resolves */
    #popup-tree-root {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Credentials panel ───────────────────────────────────────────────── */
    .creds-scroll {
      flex: 1; min-height: 0;
      overflow-y: auto;
      padding: 14px 16px;
    }
    .creds-footer {
      padding: 9px 16px; flex-shrink: 0;
      border-top: 1px solid #f1f5f9;
      font-size: 10px; color: #cbd5e1; text-align: center;
    }
  </style>
</head>
<body>

  <!-- Tab bar -->
  <div class="popup-tabs">
    <button class="popup-tab active" data-panel="component">Component</button>
    <button class="popup-tab"        data-panel="credentials">Credentials</button>
  </div>

  <!-- Component panel -->
  <div class="popup-panel active" id="panel-component">
    <div class="popup-party-bar">
      <input id="popup-party-id" class="popup-party-input" type="text"
        placeholder="Party ID (e.g. 1764)"
        autocomplete="off" spellcheck="false"/>
      <button id="popup-load-btn" class="popup-load-btn">Load</button>
    </div>
    <div id="popup-tree-root"></div>
  </div>

  <!-- Credentials panel -->
  <div class="popup-panel" id="panel-credentials">
    <div class="creds-scroll">
      <div id="credentials-root"></div>
    </div>
    <div class="creds-footer">credentials.js · v1.1.4</div>
  </div>

  <script src="corporate-tree.js"></script>
  <script src="credentials.js"></script>
  <script src="popup.js"></script>

</body>
</html>
