<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PR_EXT Credentials</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1e293b;
    }
    .header {
      background: linear-gradient(135deg, #1e293b, #334155);
      padding: 14px 16px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 34px; height: 34px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p  { font-size: 10px; opacity: 0.7; margin-top: 1px; }
    .body { padding: 14px 16px; }
    .footer {
      padding: 9px 16px;
      border-top: 1px solid #f1f5f9;
      font-size: 10px; color: #cbd5e1; text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div>
      <h1>Credentials</h1>
      <p>Stored in chrome.storage.local</p>
    </div>
  </div>

  <div class="body">
    <!-- CredentialsManager mounts here -->
    <div id="credentials-root"></div>
  </div>

  <div class="footer">PR_EXT_tree_compare.js · v1.1.4 · shared across extensions</div>

  <script src="PR_EXT_tree_compare.js"></script>
</body>
</html>
